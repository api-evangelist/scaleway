specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Scaleway
providerId: scaleway
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud Computing
  - European Cloud
  - Rate Limiting
description: Scaleway exposes a unified REST API across all products under api.scaleway.com,
  authenticated via the X-Auth-Token header. Per-product quotas are enforced rather than
  a single global RPS ceiling; each Scaleway product (Instances, Kubernetes, IAM, Object
  Storage, Generative APIs, etc.) has its own service-specific quotas documented in the
  developer portal. Public rate-limit values are not centrally published; honor 429 / 503
  responses and back off.
sources:
  - https://www.scaleway.com/en/developers/api/
  - https://www.scaleway.com/en/pricing/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-service quotas
    scope: account/region/service
    metric: varies
    limit: 'see service-specific quotas in the Scaleway developer portal'
    notes: Each Scaleway product (Instance, Kapsule, IAM, Object Storage, Serverless, Generative
      APIs, etc.) enforces its own quotas and concurrency caps; numbers are not centrally
      published.
  - name: Generative APIs throttling
    scope: account
    metric: varies
    limit: 'model-specific TPS / TPM; see Generative APIs reference'
    notes: Inference endpoints are throttled per model and per project; quota raises must
      be requested via support.
policies:
  - name: Authentication
    description: Every request must carry an X-Auth-Token header with a valid IAM secret
      key; permissions are inherited from the IAM principal.
  - name: Retry on 429 / 503
    description: Clients should back off on HTTP 429 (throttled) and 503 (service unavailable)
      using exponential backoff with jitter.
  - name: Quota raise via support
    description: Per-resource quotas (instance count, IP count, etc.) can be raised through
      a Scaleway support ticket.
  - name: Regional scoping
    description: Endpoints are zoned (api.scaleway.com/{product}/{version}/zones/{zone}/...),
      regional, or global; quotas apply per region or zone where applicable.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com

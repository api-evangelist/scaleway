aid: scaleway
name: Scaleway
description: >-
  Scaleway is a European cloud provider offering compute, storage, networking,
  and AI services. The Scaleway API provides programmatic access to all
  Scaleway cloud infrastructure and services including Instances, Kubernetes,
  Generative APIs, serverless containers, object storage, and more.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AI
  - Cloud Computing
  - Infrastructure
  - Kubernetes
  - Serverless
url: >-
  https://raw.githubusercontent.com/api-evangelist/scaleway/refs/heads/main/apis.yml
created: '2026-03-16'
modified: '2026-03-16'
specificationVersion: '0.19'
apis:
  - aid: scaleway:scaleway-instance-api
    name: Scaleway Instance API
    description: >-
      The Scaleway Instance API allows you to create, manage, and delete
      virtual machine instances, manage IP addresses, security groups, and
      other compute resources.
    humanURL: https://www.scaleway.com/en/developers/api/instances/
    tags:
      - Compute
      - Instances
      - Virtual Machines
    properties:
      - type: Documentation
        url: https://www.scaleway.com/en/developers/api/instances/
  - aid: scaleway:scaleway-kubernetes-api
    name: Scaleway Kubernetes API
    description: >-
      The Scaleway Kubernetes API (Kapsule) allows you to create and manage
      fully-managed Kubernetes clusters on Scaleway infrastructure.
    humanURL: https://www.scaleway.com/en/developers/api/kubernetes/
    tags:
      - Containers
      - Kubernetes
      - Orchestration
    properties:
      - type: Documentation
        url: https://www.scaleway.com/en/developers/api/kubernetes/
  - aid: scaleway:scaleway-generative-apis
    name: Scaleway Generative APIs
    description: >-
      Scaleway Generative APIs provide access to AI language models and
      generative AI services hosted on Scaleway infrastructure.
    humanURL: https://www.scaleway.com/en/docs/generative-apis/
    tags:
      - Artificial Intelligence
      - Generative AI
      - Language Models
    properties:
      - type: Documentation
        url: https://www.scaleway.com/en/docs/generative-apis/
      - type: Getting Started
        url: https://www.scaleway.com/en/docs/generative-apis/quickstart/

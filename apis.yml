aid: scaleway
name: Scaleway
description: Scaleway is a European cloud provider offering a full suite of compute, storage, networking, AI, and serverless
  infrastructure services. Scaleway provides a comprehensive REST API for programmatic management of all cloud resources including
  Instances, Kubernetes clusters (Kapsule and Kosmos), managed databases, load balancers, VPC networking, object storage,
  secret management, serverless containers, serverless functions, IAM, generative AI inference, and more. The Scaleway API
  uses X-Auth-Token header authentication and provides OpenAPI specifications for every product via the developer portal.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- AI
- Cloud Computing
- Containers
- Database
- European Cloud
- Infrastructure
- Kubernetes
- Serverless
- Storage

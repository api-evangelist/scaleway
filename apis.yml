    name: Scaleway Instance API
    description: >-
      The Scaleway Instance API allows you to create, manage, and delete virtual machine
      instances, manage IP addresses, security groups, images, snapshots, volumes, and
      other compute resources across Scaleway's infrastructure zones.
    humanURL: https://www.scaleway.com/en/developers/api/instances/
    tags:
      - Compute
      - Images
      - Instances
      - Security Groups
      - Snapshots
      - Virtual Machines

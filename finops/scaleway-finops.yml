serviceCategory: Cloud Infrastructure
billingModel:
  pricingCategory: Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: EUR
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Scaleway
  ServiceCategory: Cloud Infrastructure
  ProviderName: Scaleway
  PublisherName: Scaleway SAS
  InvoiceIssuerName: Scaleway SAS
  BillingCurrency: EUR
meters:
  - name: instance_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - instance_type
      - zone
      - project
  - name: block_storage
    unit: GB-month
    aggregation: sum
    dimensions:
      - volume_type
      - zone
      - project
  - name: object_storage
    unit: GB-month
    aggregation: sum
    dimensions:
      - storage_class
      - region
      - project
  - name: public_ipv4
    unit: ip-month
    aggregation: sum
    dimensions:
      - region
      - project
  - name: kubernetes_kapsule
    unit: cluster-hour
    aggregation: sum
    dimensions:
      - cluster_type
      - region
  - name: serverless_invocations
    unit: request
    aggregation: sum
    dimensions:
      - product
      - region
      - project
  - name: generative_ai_tokens
    unit: token
    aggregation: sum
    dimensions:
      - model
      - direction
      - project
principles:
  - name: Visibility
    description: Use the Scaleway Billing API (/billing/v2beta1/consumptions, /invoices,
      /export-invoices) for real-time spend and CSV export; the console exposes per-project
      cost dashboards.
  - name: Allocation
    description: Use Scaleway Projects and resource tags plus IAM to segregate spend per
      team or environment; export invoices to CSV for chargeback.
  - name: Optimization
    description: Right-size between DEV / GP / PRO / Compute / Memory instance lines, use
      per-second billing to shut idle workloads, prefer Object Storage Glacier class for
      cold data, and negotiate committed-use for predictable workloads.
  - name: Accountability
    description: Assign a project owner per Scaleway Project; reconcile monthly invoice
      exports against the consumption API and investigate anomalies via the Billing API.
maintainers:

created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Cloud Computing
  - European Cloud
description: 'FOCUS-aligned FinOps for Scaleway: pay-as-you-go European cloud billed per
  second / per GB-month / per request across compute, storage, network, AI, and managed services,
  with a real-time Billing API for consumption and invoice export.'
sources:
  - https://www.scaleway.com/en/pricing/
  - https://www.scaleway.com/en/developers/api/billing/
  - https://www.scaleway.com/en/developers/api/

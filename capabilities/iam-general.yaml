      call: iam-general.initiateuserconnection
      with:
        user_id: tools.user_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: joinuserconnection
      description: joinuserconnection
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iam-general.joinuserconnection
      with:
        user_id: tools.user_id
        body: tools.body

        call: iam-general.updateorganizationloginmethods
        with:
          organization_id: rest.organization_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/iam/v1alpha1/users/{user-id}/connections
      name: iam-v1alpha1-users-user-id-connections
      description: REST surface for iam-v1alpha1-users-user_id-connections.
      operations:
      - method: GET
        name: getuserconnections
        description: getuserconnections
        call: iam-general.getuserconnections
        with:
          user_id: rest.user_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/iam/v1alpha1/users/{user-id}/initiate-connection
      name: iam-v1alpha1-users-user-id-initiate-connection
      description: REST surface for iam-v1alpha1-users-user_id-initiate-connection.
      operations:
      - method: POST
        name: initiateuserconnection
        description: initiateuserconnection
        call: iam-general.initiateuserconnection
        with:
          user_id: rest.user_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/iam/v1alpha1/users/{user-id}/join-connection
      name: iam-v1alpha1-users-user-id-join-connection
      description: REST surface for iam-v1alpha1-users-user_id-join-connection.
      operations:
      - method: POST
        name: joinuserconnection
        description: joinuserconnection
        call: iam-general.joinuserconnection
        with:
          user_id: rest.user_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/iam/v1alpha1/users/{user-id}/remove-connection
      name: iam-v1alpha1-users-user-id-remove-connection
      description: REST surface for iam-v1alpha1-users-user_id-remove-connection.
      operations:
      - method: POST
        name: removeuserconnection
        description: removeuserconnection
        call: iam-general.removeuserconnection
        with:
          user_id: rest.user_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iam-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for IAM API. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: checkpermissions
      description: checkpermissions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iam-general.checkpermissions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

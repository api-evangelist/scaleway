naftiko: 1.0.0-alpha2
info:
  label: IAM API
  description: 'IAM API. 8 operations. Lead operation: Get your Organization''s IAM information. Self-contained Naftiko capability
    covering one Scaleway business surface.'
  tags:
  - Scaleway
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: iam-general
    baseUri: https://api.scaleway.com
    description: IAM API business capability. Self-contained, no shared references.
    resources:
    - name: iam-v1alpha1-check-permissions
      path: /iam/v1alpha1/check-permissions
      operations:
      - name: checkpermissions
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: iam-v1alpha1-organizations-organization_id
      path: /iam/v1alpha1/organizations/{organization_id}
      operations:
      - name: getorganization
        method: GET
        description: Get your Organization's IAM information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organization_id
          in: path
          type: string
          description: ID of the Organization.
          required: true
    - name: iam-v1alpha1-organizations-organization_id-alias
      path: /iam/v1alpha1/organizations/{organization_id}/alias
      operations:
      - name: setorganizationalias
        method: PUT
        description: Set your Organization's alias.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organization_id
          in: path
          type: string
          description: ID of the Organization.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: iam-v1alpha1-organizations-organization_id-login-methods
      path: /iam/v1alpha1/organizations/{organization_id}/login-methods
      operations:
      - name: updateorganizationloginmethods
        method: PATCH
        description: Set your Organization's allowed login methods.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organization_id
          in: path
          type: string
          description: ID of the Organization.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: iam-v1alpha1-users-user_id-connections
      path: /iam/v1alpha1/users/{user_id}/connections
      operations:
      - name: getuserconnections
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: ID of the user to list connections for.
          required: true
    - name: iam-v1alpha1-users-user_id-initiate-connection
      path: /iam/v1alpha1/users/{user_id}/initiate-connection
      operations:
      - name: initiateuserconnection
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: ID of the user that will be added to your connection.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: iam-v1alpha1-users-user_id-join-connection
      path: /iam/v1alpha1/users/{user_id}/join-connection
      operations:
      - name: joinuserconnection
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: User ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: iam-v1alpha1-users-user_id-remove-connection
      path: /iam/v1alpha1/users/{user_id}/remove-connection
      operations:
      - name: removeuserconnection
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: ID of the user you want to manage the connection for.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: iam-general-rest
    port: 8080
    description: REST adapter for IAM API. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/iam/v1alpha1/check-permissions
      name: iam-v1alpha1-check-permissions
      description: REST surface for iam-v1alpha1-check-permissions.
      operations:
      - method: POST
        name: checkpermissions
        description: checkpermissions
        call: iam-general.checkpermissions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/iam/v1alpha1/organizations/{organization-id}
      name: iam-v1alpha1-organizations-organization-id
      description: REST surface for iam-v1alpha1-organizations-organization_id.
      operations:
      - method: GET
        name: getorganization
        description: Get your Organization's IAM information
        call: iam-general.getorganization
        with:
          organization_id: rest.organization_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/iam/v1alpha1/organizations/{organization-id}/alias

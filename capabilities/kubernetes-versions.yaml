naftiko: 1.0.0-alpha2
info:
  label: Kubernetes API — Versions
  description: 'Kubernetes API — Versions. 2 operations. Lead operation: List all available Versions. Self-contained Naftiko
    capability covering one Scaleway business surface.'
  tags:
  - Scaleway
  - Versions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: kubernetes-versions
    baseUri: https://api.scaleway.com
    description: Kubernetes API — Versions business capability. Self-contained, no shared references.
    resources:
    - name: k8s-v1-regions-region-versions
      path: /k8s/v1/regions/{region}/versions
      operations:
      - name: listversions
        method: GET
        description: List all available Versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
    - name: k8s-v1-regions-region-versions-version_name
      path: /k8s/v1/regions/{region}/versions/{version_name}
      operations:
      - name: getversion
        method: GET
        description: Get a Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: version_name
          in: path
          type: string
          description: Requested version name.
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: kubernetes-versions-rest
    port: 8080
    description: REST adapter for Kubernetes API — Versions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/k8s/v1/regions/{region}/versions
      name: k8s-v1-regions-region-versions
      description: REST surface for k8s-v1-regions-region-versions.
      operations:
      - method: GET
        name: listversions
        description: List all available Versions
        call: kubernetes-versions.listversions
        with:
          region: rest.region
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/k8s/v1/regions/{region}/versions/{version-name}
      name: k8s-v1-regions-region-versions-version-name
      description: REST surface for k8s-v1-regions-region-versions-version_name.
      operations:
      - method: GET
        name: getversion
        description: Get a Version
        call: kubernetes-versions.getversion
        with:
          region: rest.region
          version_name: rest.version_name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kubernetes-versions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kubernetes API — Versions. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-available-versions
      description: List all available Versions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kubernetes-versions.listversions
      with:
        region: tools.region
      outputParameters:
      - type: object
        mapping: $.
    - name: get-version
      description: Get a Version
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kubernetes-versions.getversion
      with:
        region: tools.region
        version_name: tools.version_name
      outputParameters:
      - type: object
        mapping: $.

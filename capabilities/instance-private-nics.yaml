          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: server_id
          in: path
          type: string
          description: Instance to which the private NIC is attached.
          required: true
        - name: private_nic_id
          in: path
          type: string
          description: Private NIC unique ID.
          required: true
      - name: updateprivatenic

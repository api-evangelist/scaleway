naftiko: 1.0.0-alpha2
info:
  label: IAM API — Applications
  description: 'IAM API — Applications. 5 operations. Lead operation: List applications of an Organization. Self-contained
    Naftiko capability covering one Scaleway business surface.'
  tags:
  - Scaleway
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: iam-applications
    baseUri: https://api.scaleway.com
    description: IAM API — Applications business capability. Self-contained, no shared references.
    resources:
    - name: iam-v1alpha1-applications
      path: /iam/v1alpha1/applications
      operations:
      - name: listapplications
        method: GET
        description: List applications of an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_by
          in: query
          type: string
          description: Criteria for sorting results.
        - name: page_size
          in: query
          type: integer
          description: Number of results per page. Value must be between 1 and 100.
        - name: page
          in: query
          type: integer
          description: Page number. Value must be greater than 1.
        - name: name
          in: query
          type: string
          description: Name of the application to filter.
        - name: organization_id
          in: query
          type: string
          description: ID of the Organization to filter.
        - name: editable
          in: query
          type: boolean
          description: Defines whether to filter out editable applications or not.
        - name: application_ids
          in: query
          type: array
          description: Filter by list of IDs.
        - name: tag
          in: query
          type: string
          description: Filter by tags containing a given string.
      - name: createapplication
        method: POST
        description: Create a new application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: iam-v1alpha1-applications-application_id
      path: /iam/v1alpha1/applications/{application_id}
      operations:
      - name: getapplication
        method: GET
        description: Get a given application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: application_id
          in: path
          type: string
          description: ID of the application to find.
          required: true
      - name: updateapplication
        method: PATCH
        description: Update an application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: application_id
          in: path
          type: string
          description: ID of the application to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteapplication
        method: DELETE
        description: Delete an application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: application_id
          in: path
          type: string
          description: ID of the application to delete.
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: iam-applications-rest
    port: 8080
    description: REST adapter for IAM API — Applications. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/iam/v1alpha1/applications
      name: iam-v1alpha1-applications
      description: REST surface for iam-v1alpha1-applications.
      operations:
      - method: GET
        name: listapplications
        description: List applications of an Organization
        call: iam-applications.listapplications
        with:
          order_by: rest.order_by
          page_size: rest.page_size
          page: rest.page
          name: rest.name
          organization_id: rest.organization_id
          editable: rest.editable
          application_ids: rest.application_ids
          tag: rest.tag
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapplication
        description: Create a new application
        call: iam-applications.createapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/iam/v1alpha1/applications/{application-id}
      name: iam-v1alpha1-applications-application-id
      description: REST surface for iam-v1alpha1-applications-application_id.
      operations:
      - method: GET
        name: getapplication
        description: Get a given application
        call: iam-applications.getapplication
        with:
          application_id: rest.application_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateapplication
        description: Update an application
        call: iam-applications.updateapplication
        with:
          application_id: rest.application_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapplication
        description: Delete an application
        call: iam-applications.deleteapplication
        with:
          application_id: rest.application_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iam-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for IAM API — Applications. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-applications-organization
      description: List applications of an Organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iam-applications.listapplications
      with:
        order_by: tools.order_by
        page_size: tools.page_size
        page: tools.page
        name: tools.name
        organization_id: tools.organization_id
        editable: tools.editable
        application_ids: tools.application_ids
        tag: tools.tag
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-application
      description: Create a new application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iam-applications.createapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-given-application
      description: Get a given application
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iam-applications.getapplication
      with:
        application_id: tools.application_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-application
      description: Update an application
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: iam-applications.updateapplication
      with:
        application_id: tools.application_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-application
      description: Delete an application
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: iam-applications.deleteapplication
      with:
        application_id: tools.application_id
      outputParameters:
      - type: object
        mapping: $.

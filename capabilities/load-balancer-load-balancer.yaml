      path: /lb/v1/zones/{zone}/lbs
      operations:
      - name: listlbs
        method: GET
        description: List Load Balancers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: name
          in: query
          type: string
          description: Load Balancer name to filter for.
        - name: order_by
          in: query
          type: string
          description: Sort order of Load Balancers in the response.
        - name: page_size
          in: query
          type: integer
          description: Number of Load Balancers to return.
        - name: page
          in: query
          type: integer
          description: Page number to return, from the paginated results.
        - name: organization_id
          in: query
          type: string
          description: Organization ID to filter for, only Load Balancers from this Organization will be returned.
        - name: project_id
          in: query
          type: string
          description: Project ID to filter for, only Load Balancers from this Project will be returned.
        - name: tags
          in: query
          type: array
          description: Filter by tag, only Load Balancers with one or more matching tags will be returned.
      - name: createlb
        method: POST
        description: Create a Load Balancer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: lb-v1-zones-zone-lbs-lb_id
      path: /lb/v1/zones/{zone}/lbs/{lb_id}
      operations:
      - name: getlb
        method: GET
        description: Get a Load Balancer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: lb_id
          in: path
          type: string
          description: Load Balancer ID.
          required: true
      - name: updatelb
        method: PUT
        description: Update a Load Balancer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:

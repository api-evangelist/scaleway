          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: lb_id
          in: path
          type: string
          description: Load Balancer ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletelb
        method: DELETE
        description: Delete a Load Balancer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: lb_id
          in: path
          type: string
          description: ID of the Load Balancer to delete.
          required: true
        - name: release_ip
          in: query
          type: boolean
          description: Defines whether the Load Balancer's flexible IP should be deleted. Set to true to release the flexible
            IP, or false to keep it available in your account for fut
          required: true
    - name: lb-v1-zones-zone-lbs-lb_id-migrate

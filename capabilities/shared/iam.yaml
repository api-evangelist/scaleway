naftiko: "1.0.0-alpha1"

info:
  label: "Scaleway IAM API"
  description: "Identity and access management for Scaleway organizations. Manage API keys, users, groups, applications, policies, and permission sets."
  tags:
    - Access Control
    - API Keys
    - IAM
    - Identity
    - Permissions
    - Policies
    - Scaleway
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SCALEWAY_API_KEY: SCALEWAY_API_KEY

capability:
  consumes:
    - type: http
      namespace: scaleway-iam
      baseUri: https://api.scaleway.com
      description: "Scaleway IAM API for identity and access management"
      authentication:
        type: apikey
        key: X-Auth-Token
        value: "{{SCALEWAY_API_KEY}}"
        placement: header
      resources:
        - name: api-keys
          path: /iam/v1alpha1/api-keys
          description: "API key management"
          operations:
            - name: list-api-keys
              method: GET
              description: "List API Keys"
              inputParameters:
                - name: order_by
                  in: query
                  type: string
                  required: false
                  description: "Sort order"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-api-key
              method: POST
              description: "Create an API Key"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  description: "{{tools.description}}"
                  expires_at: "{{tools.expires_at}}"
        - name: api-key
          path: /iam/v1alpha1/api-keys/{access_key}
          description: "Manage a specific API key"
          operations:
            - name: get-api-key
              method: GET
              description: "Get an API Key"
              inputParameters:
                - name: access_key
                  in: path
                  type: string
                  required: true
                  description: "API key access key"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-api-key
              method: DELETE
              description: "Delete an API Key"
              inputParameters:
                - name: access_key
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: users
          path: /iam/v1alpha1/users
          description: "User management"
          operations:
            - name: list-users
              method: GET
              description: "List Users"
              inputParameters:
                - name: organization_id
                  in: query
                  type: string
                  required: false
                  description: "Organization ID filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: groups
          path: /iam/v1alpha1/groups
          description: "Group management"
          operations:
            - name: list-groups
              method: GET
              description: "List Groups"
              inputParameters:
                - name: organization_id
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-group
              method: POST
              description: "Create a Group"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
        - name: policies
          path: /iam/v1alpha1/policies
          description: "Policy management"
          operations:
            - name: list-policies
              method: GET
              description: "List Policies"
              inputParameters:
                - name: organization_id
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-policy
              method: POST
              description: "Create a Policy"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  rules: "{{tools.rules}}"
        - name: applications
          path: /iam/v1alpha1/applications
          description: "Application management"
          operations:
            - name: list-applications
              method: GET
              description: "List Applications"
              inputParameters:
                - name: organization_id
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8110
      namespace: scaleway-iam-rest
      resources:
        - path: /v1/api-keys
          name: api-keys
          operations:
            - method: GET
              name: list-api-keys
              description: "List Scaleway IAM API keys"
              call: "scaleway-iam.list-api-keys"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9110
      namespace: scaleway-iam-mcp
      transport: http
      tools:
        - name: list-api-keys
          description: "List Scaleway IAM API keys"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-iam.list-api-keys"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: "List users in Scaleway organization"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-iam.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-groups
          description: "List IAM groups"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-iam.list-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-policies
          description: "List IAM policies"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-iam.list-policies"
          outputParameters:
            - type: object
              mapping: "$."

naftiko: "1.0.0-alpha1"

info:
  label: "Scaleway Managed Database API"
  description: "Fully managed PostgreSQL, MySQL, and Redis database services with automated patch management, backups, read replicas, and snapshots."
  tags:
    - Backup
    - Database
    - MySQL
    - PostgreSQL
    - Redis
    - Relational Database
    - Scaleway
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SCALEWAY_API_KEY: SCALEWAY_API_KEY

capability:
  consumes:
    - type: http
      namespace: scaleway-db
      baseUri: https://api.scaleway.com
      description: "Scaleway Managed Database API"
      authentication:
        type: apikey
        key: X-Auth-Token
        value: "{{SCALEWAY_API_KEY}}"
        placement: header
      resources:
        - name: instances
          path: /rdb/v1/regions/{region}/instances
          description: "Database instance management"
          operations:
            - name: list-db-instances
              method: GET
              description: "List Database Instances"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                  description: "Region (e.g., fr-par)"
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-db-instance
              method: POST
              description: "Create a Database Instance"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  engine: "{{tools.engine}}"
                  node_type: "{{tools.node_type}}"
        - name: instance
          path: /rdb/v1/regions/{region}/instances/{instance_id}
          description: "Manage a specific database instance"
          operations:
            - name: get-db-instance
              method: GET
              description: "Get Database Instance"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: instance_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-db-instance
              method: DELETE
              description: "Delete a Database Instance"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: instance_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: backups
          path: /rdb/v1/regions/{region}/backups
          description: "Database backup management"
          operations:
            - name: list-db-backups
              method: GET
              description: "List Database Backups"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-db-backup
              method: POST
              description: "Create a Database Backup"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  instance_id: "{{tools.instance_id}}"
                  name: "{{tools.name}}"
        - name: database-engines
          path: /rdb/v1/regions/{region}/database-engines
          description: "Available database engines"
          operations:
            - name: list-database-engines
              method: GET
              description: "List available database engine versions"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8112
      namespace: scaleway-db-rest
      resources:
        - path: /v1/databases
          name: databases
          operations:
            - method: GET
              name: list-db-instances
              description: "List managed database instances"
              call: "scaleway-db.list-db-instances"
              with:
                region: "rest.region"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9112
      namespace: scaleway-db-mcp
      transport: http
      tools:
        - name: list-db-instances
          description: "List Scaleway managed database instances"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-db.list-db-instances"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-db-instance
          description: "Get details of a specific database instance"
          hints:
            readOnly: true
            openWorld: false
          call: "scaleway-db.get-db-instance"
          with:
            region: "tools.region"
            instance_id: "tools.instance_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-db-backups
          description: "List database backups"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-db.list-db-backups"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-database-engines
          description: "List available database engine versions"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-db.list-database-engines"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."

naftiko: "1.0.0-alpha1"

info:
  label: "Scaleway Secret Manager API"
  description: "Manage secrets, versions, and access policies in Scaleway Secret Manager for secure credential storage and rotation."
  tags:
    - Credentials
    - Scaleway
    - Secret Management
    - Security
    - Vault
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SCALEWAY_API_KEY: SCALEWAY_API_KEY

capability:
  consumes:
    - type: http
      namespace: scaleway-secrets
      baseUri: https://api.scaleway.com
      description: "Scaleway Secret Manager API"
      authentication:
        type: apikey
        key: X-Auth-Token
        value: "{{SCALEWAY_API_KEY}}"
        placement: header
      resources:
        - name: secrets
          path: /secret-manager/v1beta1/regions/{region}/secrets
          description: "Secret management"
          operations:
            - name: list-secrets
              method: GET
              description: "List all secrets in a project"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: project_id
                  in: query
                  type: string
                  required: false
                - name: per_page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-secret
              method: POST
              description: "Create a new secret"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  project_id: "{{tools.project_id}}"
                  description: "{{tools.description}}"
                  type: "{{tools.type}}"
            - name: get-secret
              method: GET
              description: "Get a secret by ID"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: secret_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-secret
              method: DELETE
              description: "Delete a secret"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: secret_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: scaleway-secrets-rest
      resources:
        - path: /v1/secrets
          name: secrets
          description: "Manage secrets"
          operations:
            - method: GET
              name: list-secrets
              description: "List secrets"
              call: "scaleway-secrets.list-secrets"
              with:
                region: "rest.region"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-secret
              description: "Create a secret"
              call: "scaleway-secrets.create-secret"
              with:
                region: "rest.region"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: scaleway-secrets-mcp
      transport: http
      tools:
        - name: list-secrets
          description: "List secrets in Scaleway Secret Manager"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-secrets.list-secrets"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-secret
          description: "Create a new secret in Scaleway Secret Manager"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "scaleway-secrets.create-secret"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-secret
          description: "Get a specific secret from Scaleway Secret Manager"
          hints:
            readOnly: true
            openWorld: false
          call: "scaleway-secrets.get-secret"
          with:
            region: "tools.region"
            secret_id: "tools.secret_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-secret
          description: "Delete a secret from Scaleway Secret Manager"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "scaleway-secrets.delete-secret"
          with:
            region: "tools.region"
            secret_id: "tools.secret_id"
          outputParameters:
            - type: object
              mapping: "$."

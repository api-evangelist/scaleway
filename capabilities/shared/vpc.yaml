naftiko: "1.0.0-alpha1"

info:
  label: "Scaleway VPC API"
  description: "Create and manage Virtual Private Clouds and regional Private Networks for interconnecting Scaleway resources within a private L2 network."
  tags:
    - Network Isolation
    - Networking
    - Private Networks
    - Scaleway
    - VPC
    - Virtual Private Cloud
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SCALEWAY_API_KEY: SCALEWAY_API_KEY

capability:
  consumes:
    - type: http
      namespace: scaleway-vpc
      baseUri: https://api.scaleway.com
      description: "Scaleway VPC API for private network management"
      authentication:
        type: apikey
        key: X-Auth-Token
        value: "{{SCALEWAY_API_KEY}}"
        placement: header
      resources:
        - name: vpcs
          path: /vpc/v2/regions/{region}/vpcs
          description: "VPC management"
          operations:
            - name: list-vpcs
              method: GET
              description: "List VPCs"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                  description: "Region (e.g., fr-par)"
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-vpc
              method: POST
              description: "Create a VPC"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
        - name: vpc
          path: /vpc/v2/regions/{region}/vpcs/{vpc_id}
          description: "Manage a specific VPC"
          operations:
            - name: get-vpc
              method: GET
              description: "Get VPC details"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: vpc_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-vpc
              method: DELETE
              description: "Delete a VPC"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: vpc_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: private-networks
          path: /vpc/v2/regions/{region}/private-networks
          description: "Private network management"
          operations:
            - name: list-private-networks
              method: GET
              description: "List Private Networks"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-private-network
              method: POST
              description: "Create a Private Network"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  vpc_id: "{{tools.vpc_id}}"
        - name: subnets
          path: /vpc/v2/regions/{region}/subnets
          description: "Subnet management"
          operations:
            - name: list-subnets
              method: GET
              description: "List Subnets"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8113
      namespace: scaleway-vpc-rest
      resources:
        - path: /v1/vpcs
          name: vpcs
          operations:
            - method: GET
              name: list-vpcs
              description: "List Scaleway VPCs"
              call: "scaleway-vpc.list-vpcs"
              with:
                region: "rest.region"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9113
      namespace: scaleway-vpc-mcp
      transport: http
      tools:
        - name: list-vpcs
          description: "List Scaleway Virtual Private Clouds"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-vpc.list-vpcs"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-private-networks
          description: "List private networks in a VPC"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-vpc.list-private-networks"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-subnets
          description: "List subnets in a region"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-vpc.list-subnets"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."

naftiko: "1.0.0-alpha1"

info:
  label: "Scaleway Transactional Email API"
  description: "Reliable transactional email delivery service. Manage sending domains, send emails, and track delivery statistics for application notifications."
  tags:
    - Email
    - Messaging
    - Notifications
    - Scaleway
    - SMTP
    - Transactional Email
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SCALEWAY_API_KEY: SCALEWAY_API_KEY

capability:
  consumes:
    - type: http
      namespace: scaleway-tem
      baseUri: https://api.scaleway.com
      description: "Scaleway Transactional Email API"
      authentication:
        type: apikey
        key: X-Auth-Token
        value: "{{SCALEWAY_API_KEY}}"
        placement: header
      resources:
        - name: domains
          path: /transactional-email/v1alpha1/regions/{region}/domains
          description: "Email domain management"
          operations:
            - name: list-tem-domains
              method: GET
              description: "List Email Domains"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-tem-domain
              method: POST
              description: "Register an Email Domain"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  project_id: "{{tools.project_id}}"
        - name: emails
          path: /transactional-email/v1alpha1/regions/{region}/emails
          description: "Email sending and tracking"
          operations:
            - name: list-emails
              method: GET
              description: "List Emails"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: send-email
              method: POST
              description: "Send a Transactional Email"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  from:
                    email: "{{tools.from_email}}"
                    name: "{{tools.from_name}}"
                  to:
                    - email: "{{tools.to_email}}"
                  subject: "{{tools.subject}}"
                  html: "{{tools.html}}"
        - name: email
          path: /transactional-email/v1alpha1/regions/{region}/emails/{email_id}
          description: "Manage a specific email"
          operations:
            - name: get-email
              method: GET
              description: "Get Email details"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: email_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8116
      namespace: scaleway-tem-rest
      resources:
        - path: /v1/emails
          name: emails
          operations:
            - method: GET
              name: list-emails
              description: "List transactional emails"
              call: "scaleway-tem.list-emails"
              with:
                region: "rest.region"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9116
      namespace: scaleway-tem-mcp
      transport: http
      tools:
        - name: list-tem-domains
          description: "List registered email sending domains"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-tem.list-tem-domains"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-emails
          description: "List sent transactional emails and delivery status"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-tem.list-emails"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-email
          description: "Send a transactional email"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "scaleway-tem.send-email"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."

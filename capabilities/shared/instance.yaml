naftiko: "1.0.0-alpha1"

info:
  label: "Scaleway Instance API"
  description: "Manage Scaleway virtual machine instances including creation, lifecycle management, images, volumes, IPs, security groups, and placement groups."
  tags:
    - Cloud Computing
    - Compute
    - Instances
    - Scaleway
    - Virtual Machines
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SCALEWAY_API_KEY: SCALEWAY_API_KEY

capability:
  consumes:
    - type: http
      namespace: scaleway-instance
      baseUri: https://api.scaleway.com
      description: "Scaleway Instance API for virtual machine management"
      authentication:
        type: apikey
        key: X-Auth-Token
        value: "{{SCALEWAY_API_KEY}}"
        placement: header
      resources:
        - name: servers
          path: /instance/v1/zones/{zone}/servers
          description: "Virtual machine instance management"
          operations:
            - name: list-servers
              method: GET
              description: "List all Instances in a zone"
              inputParameters:
                - name: zone
                  in: path
                  type: string
                  required: true
                  description: "Availability zone (e.g., fr-par-1)"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Number of instances per page"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: state
                  in: query
                  type: string
                  required: false
                  description: "Filter by state (running, stopped)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-server
              method: POST
              description: "Create a new Instance"
              inputParameters:
                - name: zone
                  in: path
                  type: string
                  required: true
                  description: "Availability zone"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  commercial_type: "{{tools.commercial_type}}"
                  image: "{{tools.image}}"
                  project: "{{tools.project}}"
            - name: get-server
              method: GET
              description: "Get a specific Instance"
              inputParameters:
                - name: zone
                  in: path
                  type: string
                  required: true
                  description: "Availability zone"
                - name: server_id
                  in: path
                  type: string
                  required: true
                  description: "Instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-server
              method: DELETE
              description: "Delete an Instance"
              inputParameters:
                - name: zone
                  in: path
                  type: string
                  required: true
                - name: server_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: server-actions
          path: /instance/v1/zones/{zone}/servers/{server_id}/action
          description: "Instance lifecycle actions"
          operations:
            - name: execute-server-action
              method: POST
              description: "Execute a lifecycle action on an Instance (poweron, poweroff, reboot, stop_in_place)"
              inputParameters:
                - name: zone
                  in: path
                  type: string
                  required: true
                - name: server_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  action: "{{tools.action}}"
        - name: images
          path: /instance/v1/zones/{zone}/images
          description: "Instance image management"
          operations:
            - name: list-images
              method: GET
              description: "List Instance images"
              inputParameters:
                - name: zone
                  in: path
                  type: string
                  required: true
                - name: per_page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: scaleway-instance-rest
      resources:
        - path: /v1/instances
          name: instances
          description: "Manage Scaleway Instances"
          operations:
            - method: GET
              name: list-instances
              description: "List Instances in a zone"
              call: "scaleway-instance.list-servers"
              with:
                zone: "rest.zone"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-instance
              description: "Create a new Instance"
              call: "scaleway-instance.create-server"
              with:
                zone: "rest.zone"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/instances/{id}
          name: instance
          description: "Manage a specific Instance"
          operations:
            - method: GET
              name: get-instance
              description: "Get a specific Instance"
              call: "scaleway-instance.get-server"
              with:
                zone: "rest.zone"
                server_id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-instance
              description: "Delete an Instance"
              call: "scaleway-instance.delete-server"
              with:
                zone: "rest.zone"
                server_id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: scaleway-instance-mcp
      transport: http
      tools:
        - name: list-instances
          description: "List all Scaleway virtual machine instances in a zone"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-instance.list-servers"
          with:
            zone: "tools.zone"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-instance
          description: "Create a new Scaleway virtual machine instance"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "scaleway-instance.create-server"
          with:
            zone: "tools.zone"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-instance
          description: "Get details of a specific Scaleway instance"
          hints:
            readOnly: true
            openWorld: false
          call: "scaleway-instance.get-server"
          with:
            zone: "tools.zone"
            server_id: "tools.server_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-instance
          description: "Delete a Scaleway instance"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "scaleway-instance.delete-server"
          with:
            zone: "tools.zone"
            server_id: "tools.server_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: execute-instance-action
          description: "Execute a lifecycle action on an instance (poweron, poweroff, reboot)"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "scaleway-instance.execute-server-action"
          with:
            zone: "tools.zone"
            server_id: "tools.server_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-images
          description: "List available OS images for Scaleway instances"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-instance.list-images"
          with:
            zone: "tools.zone"
          outputParameters:
            - type: object
              mapping: "$."

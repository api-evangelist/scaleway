naftiko: "1.0.0-alpha1"

info:
  label: "Scaleway Kubernetes API"
  description: "Manage Scaleway managed Kubernetes clusters (Kapsule and Kosmos) including cluster lifecycle, node pools, upgrades, kubeconfig retrieval, and ACL management."
  tags:
    - Containers
    - Kubernetes
    - Kapsule
    - Orchestration
    - Scaleway
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SCALEWAY_API_KEY: SCALEWAY_API_KEY

capability:
  consumes:
    - type: http
      namespace: scaleway-kubernetes
      baseUri: https://api.scaleway.com
      description: "Scaleway Kubernetes API (Kapsule and Kosmos)"
      authentication:
        type: apikey
        key: X-Auth-Token
        value: "{{SCALEWAY_API_KEY}}"
        placement: header
      resources:
        - name: clusters
          path: /k8s/v1/regions/{region}/clusters
          description: "Kubernetes cluster lifecycle management"
          operations:
            - name: list-clusters
              method: GET
              description: "List Kubernetes clusters"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                  description: "Region (e.g., fr-par)"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-cluster
              method: POST
              description: "Create a new Kubernetes cluster"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  version: "{{tools.version}}"
                  cni: "{{tools.cni}}"
                  project_id: "{{tools.project_id}}"
            - name: get-cluster
              method: GET
              description: "Get a Kubernetes cluster"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: cluster_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-cluster
              method: DELETE
              description: "Delete a Kubernetes cluster"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: cluster_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: kubeconfig
          path: /k8s/v1/regions/{region}/clusters/{cluster_id}/kubeconfig
          description: "Kubernetes cluster access configuration"
          operations:
            - name: get-cluster-kubeconfig
              method: GET
              description: "Download the kubeconfig for a cluster"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: cluster_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: pools
          path: /k8s/v1/regions/{region}/clusters/{cluster_id}/pools
          description: "Node pool management"
          operations:
            - name: list-pools
              method: GET
              description: "List node pools in a cluster"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: cluster_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-pool
              method: POST
              description: "Create a node pool in a cluster"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: cluster_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  node_type: "{{tools.node_type}}"
                  size: "{{tools.size}}"
        - name: nodes
          path: /k8s/v1/regions/{region}/clusters/{cluster_id}/nodes
          description: "Node management"
          operations:
            - name: list-nodes
              method: GET
              description: "List nodes in a cluster"
              inputParameters:
                - name: region
                  in: path
                  type: string
                  required: true
                - name: cluster_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: scaleway-kubernetes-rest
      resources:
        - path: /v1/clusters
          name: clusters
          description: "Manage Scaleway Kubernetes clusters"
          operations:
            - method: GET
              name: list-clusters
              description: "List Kubernetes clusters"
              call: "scaleway-kubernetes.list-clusters"
              with:
                region: "rest.region"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-cluster
              description: "Create a Kubernetes cluster"
              call: "scaleway-kubernetes.create-cluster"
              with:
                region: "rest.region"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/clusters/{id}
          name: cluster
          description: "Manage a specific Kubernetes cluster"
          operations:
            - method: GET
              name: get-cluster
              description: "Get cluster details"
              call: "scaleway-kubernetes.get-cluster"
              with:
                region: "rest.region"
                cluster_id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/clusters/{id}/kubeconfig
          name: kubeconfig
          description: "Kubernetes cluster access configuration"
          operations:
            - method: GET
              name: get-kubeconfig
              description: "Get cluster kubeconfig"
              call: "scaleway-kubernetes.get-cluster-kubeconfig"
              with:
                region: "rest.region"
                cluster_id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: scaleway-kubernetes-mcp
      transport: http
      tools:
        - name: list-clusters
          description: "List Scaleway Kubernetes clusters in a region"
          hints:
            readOnly: true
            openWorld: true
          call: "scaleway-kubernetes.list-clusters"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-cluster
          description: "Create a new Scaleway Kubernetes cluster"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "scaleway-kubernetes.create-cluster"
          with:
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-cluster
          description: "Get details of a Scaleway Kubernetes cluster"
          hints:
            readOnly: true
            openWorld: false
          call: "scaleway-kubernetes.get-cluster"
          with:
            region: "tools.region"
            cluster_id: "tools.cluster_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-cluster
          description: "Delete a Scaleway Kubernetes cluster"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "scaleway-kubernetes.delete-cluster"
          with:
            region: "tools.region"
            cluster_id: "tools.cluster_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-cluster-kubeconfig
          description: "Download kubeconfig for a Scaleway Kubernetes cluster"
          hints:
            readOnly: true
            openWorld: false
          call: "scaleway-kubernetes.get-cluster-kubeconfig"
          with:
            region: "tools.region"
            cluster_id: "tools.cluster_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-node-pools
          description: "List node pools in a Kubernetes cluster"
          hints:
            readOnly: true
            openWorld: false
          call: "scaleway-kubernetes.list-pools"
          with:
            region: "tools.region"
            cluster_id: "tools.cluster_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-node-pool
          description: "Create a node pool in a Kubernetes cluster"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "scaleway-kubernetes.create-pool"
          with:
            region: "tools.region"
            cluster_id: "tools.cluster_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-nodes
          description: "List nodes in a Kubernetes cluster"
          hints:
            readOnly: true
            openWorld: false
          call: "scaleway-kubernetes.list-nodes"
          with:
            region: "tools.region"
            cluster_id: "tools.cluster_id"
          outputParameters:
            - type: object
              mapping: "$."

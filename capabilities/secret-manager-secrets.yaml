    - name: secret-manager-v1beta1-regions-region-secrets
      path: /secret-manager/v1beta1/regions/{region}/secrets
      operations:
      - name: listsecrets
        method: GET
        description: List secrets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: organization_id
          in: query
          type: string
          description: Filter by Organization ID (optional). (UUID format)
        - name: project_id
          in: query
          type: string
          description: Filter by Project ID (optional). (UUID format)
        - name: order_by
          in: query
          type: string
        - name: page
          in: query
          type: string
        - name: page_size
          in: query
          type: integer
        - name: tags
          in: query
          type: array
          description: List of tags to filter on (optional).
        - name: name
          in: query
          type: string
          description: Filter by secret name (optional).
        - name: path
          in: query
          type: string
          description: Filter by exact path (optional).
        - name: ephemeral
          in: query
          type: boolean
          description: Filter by ephemeral / not ephemeral (optional).
        - name: type
          in: query
          type: string
          description: Filter by secret type (optional).
        - name: scheduled_for_deletion
          in: query
          type: boolean
          description: Filter by whether the secret was scheduled for deletion / not scheduled for deletion. By default, it
            will display only not scheduled for deletion secrets.
          required: true
      - name: createsecret
        method: POST
        description: Create a secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true

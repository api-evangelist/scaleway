  - type: http
    namespace: vpc-routes
    baseUri: https://api.scaleway.com
    description: VPC API — Routes business capability. Self-contained, no shared references.
    resources:
    - name: vpc-v2-regions-region-routes
      path: /vpc/v2/regions/{region}/routes
      operations:
      - name: createroute
        method: POST
        description: Create a Route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: vpc-v2-regions-region-routes-route_id
      path: /vpc/v2/regions/{region}/routes/{route_id}
      operations:
      - name: getroute
        method: GET
        description: Get a Route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: route_id
          in: path
          type: string
          description: Route ID. (UUID format)
          required: true
      - name: updateroute
        method: PATCH
        description: Update Route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: route_id
          in: path
          type: string
          description: Route ID. (UUID format)
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteroute
        method: DELETE
        description: Delete a Route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: route_id
          in: path
          type: string
          description: Route ID. (UUID format)
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: vpc-routes-rest
    port: 8080
    description: REST adapter for VPC API — Routes. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/vpc/v2/regions/{region}/routes
      name: vpc-v2-regions-region-routes
      description: REST surface for vpc-v2-regions-region-routes.
      operations:
      - method: POST
        name: createroute
        description: Create a Route
        call: vpc-routes.createroute
        with:
          region: rest.region
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vpc/v2/regions/{region}/routes/{route-id}
      name: vpc-v2-regions-region-routes-route-id
      description: REST surface for vpc-v2-regions-region-routes-route_id.
      operations:

        name: getroute
        description: Get a Route
        call: vpc-routes.getroute
        with:
          region: rest.region
          route_id: rest.route_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateroute
        description: Update Route
        call: vpc-routes.updateroute
        with:
          region: rest.region
          route_id: rest.route_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteroute
        description: Delete a Route
        call: vpc-routes.deleteroute
        with:
          region: rest.region
          route_id: rest.route_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vpc-routes-mcp
    port: 9090
    transport: http
    description: MCP adapter for VPC API — Routes. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-route
      description: Create a Route
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vpc-routes.createroute
      with:
        region: tools.region
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-route
      description: Get a Route
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vpc-routes.getroute
      with:
        region: tools.region
        route_id: tools.route_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-route
      description: Update Route
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: vpc-routes.updateroute
      with:
        region: tools.region
        route_id: tools.route_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-route
      description: Delete a Route
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: vpc-routes.deleteroute
      with:
        region: tools.region
        route_id: tools.route_id
      outputParameters:
      - type: object
        mapping: $.

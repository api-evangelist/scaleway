      operations:
      - name: getwebhook
        method: GET
        description: Get information about a Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: webhook_id
          in: path
          type: string
          description: ID of the Webhook to check. (UUID format)
          required: true
      - name: updatewebhook
        method: PATCH

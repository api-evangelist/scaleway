naftiko: 1.0.0-alpha2
info:
  label: Managed Database for PostgreSQL and MySQL API — Users
  description: 'Managed Database for PostgreSQL and MySQL API — Users. 4 operations. Lead operation: List users of a Database
    Instance. Self-contained Naftiko capability covering one Scaleway business surface.'
  tags:
  - Scaleway
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: database-users
    baseUri: https://api.scaleway.com
    description: Managed Database for PostgreSQL and MySQL API — Users business capability. Self-contained, no shared references.
    resources:
    - name: rdb-v1-regions-region-instances-instance_id-users
      path: /rdb/v1/regions/{region}/instances/{instance_id}/users
      operations:
      - name: listusers
        method: GET
        description: List users of a Database Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: instance_id
          in: path
          type: string
          description: UUID of the Database Instance.
          required: true
        - name: name
          in: query
          type: string
          description: Name of the user.
        - name: order_by
          in: query
          type: string
          description: Criteria to use when requesting user listing.
        - name: page
          in: query
          type: string
        - name: page_size
          in: query
          type: integer
      - name: createuser
        method: POST
        description: Create a user for a Database Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: instance_id
          in: path
          type: string
          description: UUID of the Database Instance in which you want to create a user.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rdb-v1-regions-region-instances-instance_id-users-name
      path: /rdb/v1/regions/{region}/instances/{instance_id}/users/{name}
      operations:
      - name: updateuser
        method: PATCH
        description: Update a user on a Database Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: instance_id
          in: path
          type: string
          description: UUID of the Database Instance the user belongs to.
          required: true
        - name: name
          in: path
          type: string
          description: Name of the database user.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteuser
        method: DELETE
        description: Delete a user on a Database Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: instance_id
          in: path
          type: string
          description: UUID of the Database Instance to delete the user from.
          required: true
        - name: name
          in: path
          type: string
          description: Name of the user.
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: database-users-rest
    port: 8080
    description: REST adapter for Managed Database for PostgreSQL and MySQL API — Users. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/rdb/v1/regions/{region}/instances/{instance-id}/users
      name: rdb-v1-regions-region-instances-instance-id-users
      description: REST surface for rdb-v1-regions-region-instances-instance_id-users.
      operations:
      - method: GET
        name: listusers
        description: List users of a Database Instance
        call: database-users.listusers
        with:
          region: rest.region
          instance_id: rest.instance_id
          name: rest.name
          order_by: rest.order_by
          page: rest.page
          page_size: rest.page_size
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createuser
        description: Create a user for a Database Instance
        call: database-users.createuser
        with:
          region: rest.region
          instance_id: rest.instance_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rdb/v1/regions/{region}/instances/{instance-id}/users/{name}
      name: rdb-v1-regions-region-instances-instance-id-users-name
      description: REST surface for rdb-v1-regions-region-instances-instance_id-users-name.
      operations:
      - method: PATCH
        name: updateuser
        description: Update a user on a Database Instance
        call: database-users.updateuser
        with:
          region: rest.region
          instance_id: rest.instance_id
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: Delete a user on a Database Instance
        call: database-users.deleteuser
        with:
          region: rest.region
          instance_id: rest.instance_id
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: database-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Managed Database for PostgreSQL and MySQL API — Users. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-users-database-instance
      description: List users of a Database Instance
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: database-users.listusers
      with:
        region: tools.region
        instance_id: tools.instance_id
        name: tools.name
        order_by: tools.order_by
        page: tools.page
        page_size: tools.page_size
      outputParameters:
      - type: object
        mapping: $.
    - name: create-user-database-instance
      description: Create a user for a Database Instance
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: database-users.createuser
      with:
        region: tools.region
        instance_id: tools.instance_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user-database-instance
      description: Update a user on a Database Instance
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: database-users.updateuser
      with:
        region: tools.region
        instance_id: tools.instance_id
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-user-database-instance
      description: Delete a user on a Database Instance
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: database-users.deleteuser
      with:
        region: tools.region
        instance_id: tools.instance_id
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.

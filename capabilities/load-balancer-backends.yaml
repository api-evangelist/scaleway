          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: setbackendservers
        method: PUT
        description: Define all backend servers for a given backend
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:

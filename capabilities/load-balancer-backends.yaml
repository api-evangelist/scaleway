    description: Load Balancer API — Backends business capability. Self-contained, no shared references.
    resources:
    - name: lb-v1-zones-zone-backends-backend_id
      path: /lb/v1/zones/{zone}/backends/{backend_id}
      operations:
      - name: getbackend
        method: GET
        description: Get a backend of a given Load Balancer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: backend_id
          in: path
          type: string
          description: Backend ID.
          required: true
      - name: updatebackend
        method: PUT
        description: Update a backend of a given Load Balancer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: backend_id
          in: path
          type: string
          description: Backend ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletebackend
        method: DELETE
        description: Delete a backend of a given Load Balancer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: backend_id
          in: path
          type: string
          description: ID of the backend to delete.
          required: true

      path: /lb/v1/zones/{zone}/lbs/{lb_id}/backend-stats
      operations:
      - name: listbackendstats
        method: GET
        description: List backend server statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: lb_id
          in: path
          type: string
          description: Load Balancer ID.
          required: true
        - name: page
          in: query
          type: integer
          description: The page number to return, from the paginated results.
        - name: page_size
          in: query
          type: integer
          description: Number of items to return.
        - name: backend_id
          in: query
          type: string

naftiko: 1.0.0-alpha2
info:
  label: Scaleway Database Management
  description: Unified workflow capability for managing Scaleway managed database services including PostgreSQL, MySQL, and
    Redis instances, backups, and notifications via transactional email. Used by database administrators and application developers
    to provision, monitor, and maintain managed database infrastructure on Scaleway's European cloud.
  tags:
  - Backup
  - Cloud Computing
  - Database
  - MySQL
  - Notifications
  - PostgreSQL
  - Redis
  - Scaleway
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: scaleway-db
    baseUri: https://api.scaleway.com
    description: Scaleway Managed Database API
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{SCALEWAY_API_KEY}}'
      placement: header
    resources:
    - name: instances
      path: /rdb/v1/regions/{region}/instances
      description: Database instance management
      operations:
      - name: list-db-instances
        method: GET
        description: List Database Instances
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
          description: Region (e.g., fr-par)
        - name: page
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-db-instance
        method: POST
        description: Create a Database Instance
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            engine: '{{tools.engine}}'
            node_type: '{{tools.node_type}}'
    - name: instance
      path: /rdb/v1/regions/{region}/instances/{instance_id}
      description: Manage a specific database instance
      operations:
      - name: get-db-instance
        method: GET
        description: Get Database Instance
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        - name: instance_id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-db-instance
        method: DELETE
        description: Delete a Database Instance
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        - name: instance_id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: backups
      path: /rdb/v1/regions/{region}/backups
      description: Database backup management
      operations:
      - name: list-db-backups
        method: GET
        description: List Database Backups
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-db-backup
        method: POST
        description: Create a Database Backup
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            instance_id: '{{tools.instance_id}}'
            name: '{{tools.name}}'
    - name: database-engines
      path: /rdb/v1/regions/{region}/database-engines
      description: Available database engines
      operations:
      - name: list-database-engines
        method: GET
        description: List available database engine versions
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: scaleway-tem
    baseUri: https://api.scaleway.com
    description: Scaleway Transactional Email API
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{SCALEWAY_API_KEY}}'
      placement: header
    resources:
    - name: domains
      path: /transactional-email/v1alpha1/regions/{region}/domains
      description: Email domain management
      operations:
      - name: list-tem-domains
        method: GET
        description: List Email Domains
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-tem-domain
        method: POST
        description: Register an Email Domain
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            project_id: '{{tools.project_id}}'
    - name: emails
      path: /transactional-email/v1alpha1/regions/{region}/emails
      description: Email sending and tracking
      operations:
      - name: list-emails
        method: GET
        description: List Emails
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        - name: page
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: send-email
        method: POST
        description: Send a Transactional Email
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            from:
              email: '{{tools.from_email}}'
              name: '{{tools.from_name}}'
            to:
            - email: '{{tools.to_email}}'
            subject: '{{tools.subject}}'
            html: '{{tools.html}}'
    - name: email
      path: /transactional-email/v1alpha1/regions/{region}/emails/{email_id}
      description: Manage a specific email
      operations:
      - name: get-email
        method: GET
        description: Get Email details
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        - name: email_id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8084
    namespace: scaleway-database-api
    description: Unified REST API for Scaleway database management and notifications.
    resources:
    - path: /v1/databases
      name: databases
      description: Database instance management
      operations:
      - method: GET
        name: list-db-instances
        description: List managed database instances
        call: scaleway-db.list-db-instances
        with:
          region: rest.region
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-db-instance
        description: Create a managed database instance
        call: scaleway-db.create-db-instance
        with:
          region: rest.region
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/databases/{id}
      name: database
      description: Manage a specific database instance
      operations:
      - method: GET
        name: get-db-instance
        description: Get database instance details
        call: scaleway-db.get-db-instance
        with:
          region: rest.region
          instance_id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-db-instance
        description: Delete a database instance
        call: scaleway-db.delete-db-instance
        with:
          region: rest.region
          instance_id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database-backups
      name: database-backups
      description: Database backup management
      operations:
      - method: GET
        name: list-db-backups
        description: List database backups
        call: scaleway-db.list-db-backups
        with:
          region: rest.region
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-db-backup
        description: Create a database backup
        call: scaleway-db.create-db-backup
        with:
          region: rest.region
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database-engines
      name: database-engines
      description: Available database engines
      operations:
      - method: GET
        name: list-database-engines
        description: List available database engine versions
        call: scaleway-db.list-database-engines
        with:
          region: rest.region
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/emails
      name: emails
      description: Email notification management
      operations:
      - method: POST
        name: send-notification-email
        description: Send a database alert or notification email
        call: scaleway-tem.send-email
        with:
          region: rest.region
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9094
    namespace: scaleway-database-mcp
    transport: http
    description: MCP server for AI-assisted Scaleway database management.
    tools:
    - name: list-db-instances
      description: List Scaleway managed database instances
      hints:
        readOnly: true
        openWorld: true
      call: scaleway-db.list-db-instances
      with:
        region: tools.region
      outputParameters:
      - type: object
        mapping: $.
    - name: create-db-instance
      description: Create a new managed PostgreSQL, MySQL, or Redis instance
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: scaleway-db.create-db-instance
      with:
        region: tools.region
      outputParameters:
      - type: object
        mapping: $.
    - name: get-db-instance
      description: Get details of a specific database instance
      hints:
        readOnly: true
        openWorld: false
      call: scaleway-db.get-db-instance
      with:
        region: tools.region
        instance_id: tools.instance_id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-db-instance
      description: Delete a managed database instance
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: scaleway-db.delete-db-instance
      with:
        region: tools.region
        instance_id: tools.instance_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-db-backups
      description: List database backups
      hints:
        readOnly: true
        openWorld: true
      call: scaleway-db.list-db-backups
      with:
        region: tools.region
      outputParameters:
      - type: object
        mapping: $.
    - name: create-db-backup
      description: Create a database backup
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: scaleway-db.create-db-backup
      with:
        region: tools.region
      outputParameters:
      - type: object
        mapping: $.
    - name: list-database-engines
      description: List available database engine versions
      hints:
        readOnly: true
        openWorld: true
      call: scaleway-db.list-database-engines
      with:
        region: tools.region
      outputParameters:
      - type: object
        mapping: $.
    - name: send-notification-email
      description: Send database alerts or notifications via transactional email
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: scaleway-tem.send-email
      with:
        region: tools.region
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Managed Database for PostgreSQL and MySQL API — Privileges
  description: 'Managed Database for PostgreSQL and MySQL API — Privileges. 2 operations. Lead operation: List user privileges
    for a database. Self-contained Naftiko capability covering one Scaleway business surface.'
  tags:
  - Scaleway
  - Privileges
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: database-privileges
    baseUri: https://api.scaleway.com
    description: Managed Database for PostgreSQL and MySQL API — Privileges business capability. Self-contained, no shared
      references.
    resources:
    - name: rdb-v1-regions-region-instances-instance_id-privileges
      path: /rdb/v1/regions/{region}/instances/{instance_id}/privileges
      operations:
      - name: listprivileges
        method: GET
        description: List user privileges for a database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: instance_id
          in: path
          type: string
          description: UUID of the Database Instance.
          required: true
        - name: order_by
          in: query
          type: string
          description: Criteria to use when ordering privileges listing.
        - name: page
          in: query
          type: string
        - name: page_size
          in: query
          type: integer
        - name: database_name
          in: query
          type: string
          description: Name of the database.
        - name: user_name
          in: query
          type: string
          description: Name of the user.
      - name: setprivilege
        method: PUT
        description: Set user privileges for a database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: instance_id
          in: path
          type: string
          description: UUID of the Database Instance.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: database-privileges-rest
    port: 8080
    description: REST adapter for Managed Database for PostgreSQL and MySQL API — Privileges. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/rdb/v1/regions/{region}/instances/{instance-id}/privileges
      name: rdb-v1-regions-region-instances-instance-id-privileges
      description: REST surface for rdb-v1-regions-region-instances-instance_id-privileges.
      operations:
      - method: GET
        name: listprivileges
        description: List user privileges for a database
        call: database-privileges.listprivileges
        with:
          region: rest.region
          instance_id: rest.instance_id
          order_by: rest.order_by
          page: rest.page
          page_size: rest.page_size
          database_name: rest.database_name
          user_name: rest.user_name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: setprivilege
        description: Set user privileges for a database
        call: database-privileges.setprivilege
        with:
          region: rest.region
          instance_id: rest.instance_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: database-privileges-mcp
    port: 9090
    transport: http
    description: MCP adapter for Managed Database for PostgreSQL and MySQL API — Privileges. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-user-privileges-database
      description: List user privileges for a database
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: database-privileges.listprivileges
      with:
        region: tools.region
        instance_id: tools.instance_id
        order_by: tools.order_by
        page: tools.page
        page_size: tools.page_size
        database_name: tools.database_name
        user_name: tools.user_name
      outputParameters:
      - type: object
        mapping: $.
    - name: set-user-privileges-database
      description: Set user privileges for a database
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: database-privileges.setprivilege
      with:
        region: tools.region
        instance_id: tools.instance_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Serverless Functions API — Namespaces
  description: 'Serverless Functions API — Namespaces. 5 operations. Lead operation: List all your namespaces. Self-contained
    Naftiko capability covering one Scaleway business surface.'
  tags:
  - Scaleway
  - Namespaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: serverless-functions-namespaces
    baseUri: https://api.scaleway.com
    description: Serverless Functions API — Namespaces business capability. Self-contained, no shared references.
    resources:
    - name: functions-v1beta1-regions-region-namespaces
      path: /functions/v1beta1/regions/{region}/namespaces
      operations:
      - name: listnamespaces
        method: GET
        description: List all your namespaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: page
          in: query
          type: integer
          description: Page number.
        - name: page_size
          in: query
          type: integer
          description: Number of namespaces per page.
        - name: order_by
          in: query
          type: string
          description: Order of the namespaces.
        - name: name
          in: query
          type: string
          description: Name of the namespace.
        - name: organization_id
          in: query
          type: string
          description: UUID of the Organization the namespace belongs to.
        - name: project_id
          in: query
          type: string
          description: UUID of the Project the namespace belongs to.
      - name: createnamespace
        method: POST
        description: Create a new namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: functions-v1beta1-regions-region-namespaces-namespace_id
      path: /functions/v1beta1/regions/{region}/namespaces/{namespace_id}
      operations:
      - name: getnamespace
        method: GET
        description: Get a namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: namespace_id
          in: path
          type: string
          description: UUID of the namespace.
          required: true
      - name: updatenamespace
        method: PATCH
        description: Update an existing namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: namespace_id
          in: path
          type: string
          description: UUID of the namespapce.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletenamespace
        method: DELETE
        description: Delete an existing namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: namespace_id
          in: path
          type: string
          description: UUID of the namespace.
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: serverless-functions-namespaces-rest
    port: 8080
    description: REST adapter for Serverless Functions API — Namespaces. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/functions/v1beta1/regions/{region}/namespaces
      name: functions-v1beta1-regions-region-namespaces
      description: REST surface for functions-v1beta1-regions-region-namespaces.
      operations:
      - method: GET
        name: listnamespaces
        description: List all your namespaces
        call: serverless-functions-namespaces.listnamespaces
        with:
          region: rest.region
          page: rest.page
          page_size: rest.page_size
          order_by: rest.order_by
          name: rest.name
          organization_id: rest.organization_id
          project_id: rest.project_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createnamespace
        description: Create a new namespace
        call: serverless-functions-namespaces.createnamespace
        with:
          region: rest.region
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/functions/v1beta1/regions/{region}/namespaces/{namespace-id}
      name: functions-v1beta1-regions-region-namespaces-namespace-id
      description: REST surface for functions-v1beta1-regions-region-namespaces-namespace_id.
      operations:
      - method: GET
        name: getnamespace
        description: Get a namespace
        call: serverless-functions-namespaces.getnamespace
        with:
          region: rest.region
          namespace_id: rest.namespace_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatenamespace
        description: Update an existing namespace
        call: serverless-functions-namespaces.updatenamespace
        with:
          region: rest.region
          namespace_id: rest.namespace_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletenamespace
        description: Delete an existing namespace
        call: serverless-functions-namespaces.deletenamespace
        with:
          region: rest.region
          namespace_id: rest.namespace_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: serverless-functions-namespaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Serverless Functions API — Namespaces. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-your-namespaces
      description: List all your namespaces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: serverless-functions-namespaces.listnamespaces
      with:
        region: tools.region
        page: tools.page
        page_size: tools.page_size
        order_by: tools.order_by
        name: tools.name
        organization_id: tools.organization_id
        project_id: tools.project_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-namespace
      description: Create a new namespace
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: serverless-functions-namespaces.createnamespace
      with:
        region: tools.region
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-namespace
      description: Get a namespace
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: serverless-functions-namespaces.getnamespace
      with:
        region: tools.region
        namespace_id: tools.namespace_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-existing-namespace
      description: Update an existing namespace
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: serverless-functions-namespaces.updatenamespace
      with:
        region: tools.region
        namespace_id: tools.namespace_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-existing-namespace
      description: Delete an existing namespace
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: serverless-functions-namespaces.deletenamespace
      with:
        region: tools.region
        namespace_id: tools.namespace_id
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Load Balancer API — Frontends
  description: 'Load Balancer API — Frontends. 5 operations. Lead operation: Get a frontend. Self-contained Naftiko capability
    covering one Scaleway business surface.'
  tags:
  - Scaleway
  - Frontends
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: load-balancer-frontends
    baseUri: https://api.scaleway.com
    description: Load Balancer API — Frontends business capability. Self-contained, no shared references.
    resources:
    - name: lb-v1-zones-zone-frontends-frontend_id
      path: /lb/v1/zones/{zone}/frontends/{frontend_id}
      operations:
      - name: getfrontend
        method: GET
        description: Get a frontend
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: frontend_id
          in: path
          type: string
          description: Frontend ID.
          required: true
      - name: updatefrontend
        method: PUT
        description: Update a frontend
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: frontend_id
          in: path
          type: string
          description: Frontend ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletefrontend
        method: DELETE
        description: Delete a frontend
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: frontend_id
          in: path
          type: string
          description: ID of the frontend to delete.
          required: true
    - name: lb-v1-zones-zone-lbs-lb_id-frontends
      path: /lb/v1/zones/{zone}/lbs/{lb_id}/frontends
      operations:
      - name: listfrontends
        method: GET
        description: List frontends of a given Load Balancer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: lb_id
          in: path
          type: string
          description: Load Balancer ID.
          required: true
        - name: name
          in: query
          type: string
          description: Name of the frontend to filter for.
        - name: order_by
          in: query
          type: string
          description: Sort order of frontends in the response.
        - name: page
          in: query
          type: integer
          description: The page number to return, from the paginated results.
        - name: page_size
          in: query
          type: integer
          description: Number of frontends to return.
      - name: createfrontend
        method: POST
        description: Create a frontend in a given Load Balancer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: lb_id
          in: path
          type: string
          description: Load Balancer ID (ID of the Load Balancer to attach the frontend to).
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: load-balancer-frontends-rest
    port: 8080
    description: REST adapter for Load Balancer API — Frontends. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/lb/v1/zones/{zone}/frontends/{frontend-id}
      name: lb-v1-zones-zone-frontends-frontend-id
      description: REST surface for lb-v1-zones-zone-frontends-frontend_id.
      operations:
      - method: GET
        name: getfrontend
        description: Get a frontend
        call: load-balancer-frontends.getfrontend
        with:
          zone: rest.zone
          frontend_id: rest.frontend_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatefrontend
        description: Update a frontend
        call: load-balancer-frontends.updatefrontend
        with:
          zone: rest.zone
          frontend_id: rest.frontend_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletefrontend
        description: Delete a frontend
        call: load-balancer-frontends.deletefrontend
        with:
          zone: rest.zone
          frontend_id: rest.frontend_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lb/v1/zones/{zone}/lbs/{lb-id}/frontends
      name: lb-v1-zones-zone-lbs-lb-id-frontends
      description: REST surface for lb-v1-zones-zone-lbs-lb_id-frontends.
      operations:
      - method: GET
        name: listfrontends
        description: List frontends of a given Load Balancer
        call: load-balancer-frontends.listfrontends
        with:
          zone: rest.zone
          lb_id: rest.lb_id
          name: rest.name
          order_by: rest.order_by
          page: rest.page
          page_size: rest.page_size
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createfrontend
        description: Create a frontend in a given Load Balancer
        call: load-balancer-frontends.createfrontend
        with:
          zone: rest.zone
          lb_id: rest.lb_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: load-balancer-frontends-mcp
    port: 9090
    transport: http
    description: MCP adapter for Load Balancer API — Frontends. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-frontend
      description: Get a frontend
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: load-balancer-frontends.getfrontend
      with:
        zone: tools.zone
        frontend_id: tools.frontend_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-frontend
      description: Update a frontend
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: load-balancer-frontends.updatefrontend
      with:
        zone: tools.zone
        frontend_id: tools.frontend_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-frontend
      description: Delete a frontend
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: load-balancer-frontends.deletefrontend
      with:
        zone: tools.zone
        frontend_id: tools.frontend_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-frontends-given-load-balancer
      description: List frontends of a given Load Balancer
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: load-balancer-frontends.listfrontends
      with:
        zone: tools.zone
        lb_id: tools.lb_id
        name: tools.name
        order_by: tools.order_by
        page: tools.page
        page_size: tools.page_size
      outputParameters:
      - type: object
        mapping: $.
    - name: create-frontend-given-load-balancer
      description: Create a frontend in a given Load Balancer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: load-balancer-frontends.createfrontend
      with:
        zone: tools.zone
        lb_id: tools.lb_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

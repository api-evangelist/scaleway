      path: /rdb/v1/regions/{region}/backups/{database_backup_id}/export
      operations:
      - name: exportdatabasebackup
        method: POST
        description: Export a database backup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string

      operations:
      - name: listdatabasebackups
        method: GET
        description: List database backups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: name
          in: query
          type: string
          description: Name of the database backups.
        - name: order_by
          in: query
          type: string
          description: Criteria to use when ordering database backups listing.
        - name: instance_id
          in: query
          type: string
          description: UUID of the Database Instance.
        - name: organization_id
          in: query
          type: string
          description: Organization ID of the Organization the database backups belong to.
        - name: project_id
          in: query
          type: string
          description: Project ID of the Project the database backups belong to.
        - name: page
          in: query
          type: string
        - name: page_size
          in: query
          type: integer
      - name: createdatabasebackup
        method: POST
        description: Create a database backup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true

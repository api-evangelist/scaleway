      path: /containers/v1/regions/{region}/containers/{container_id}
      operations:
      - name: getcontainer
        method: GET
        description: Get the container associated with the specified ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: container_id
          in: path
          type: string
          required: true
      - name: updatecontainer
        method: PATCH
        description: Update the container associated with the specified ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: container_id
          in: path
          type: string
          description: UUID of the container to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecontainer
        method: DELETE
        description: Delete the container associated with the specified ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: container_id
          in: path
          type: string
          description: UUID of the container to delete.
          required: true
    - name: containers-v1-regions-region-containers-container_id-redeploy
      path: /containers/v1/regions/{region}/containers/{container_id}/redeploy
      operations:
      - name: redeploycontainer
        method: POST
        description: Redeploy a container
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: container_id
          in: path
          type: string
          description: ID of the container to redeploy.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).

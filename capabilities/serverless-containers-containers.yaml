    baseUri: https://api.scaleway.com
    description: Serverless Containers API — Containers business capability. Self-contained, no shared references.
    resources:
    - name: containers-v1-regions-region-containers
      path: /containers/v1/regions/{region}/containers
      operations:
      - name: listcontainers
        method: GET
        description: List all containers the caller can access (read permission).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: page
          in: query
          type: integer
        - name: page_size
          in: query
          type: integer
        - name: order_by
          in: query
          type: string
        - name: organization_id
          in: query
          type: string
        - name: project_id
          in: query
          type: string
        - name: namespace_id
          in: query
          type: string
        - name: name
          in: query
          type: string
      - name: createcontainer
        method: POST
        description: Create a new container in a namespace.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true

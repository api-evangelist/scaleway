        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcontainer
        description: Create a new container in a namespace.
        call: serverless-containers-containers.createcontainer
        with:
          region: rest.region
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.

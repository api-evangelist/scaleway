naftiko: 1.0.0-alpha2
info:
  label: Serverless Functions API — Crons
  description: 'Serverless Functions API — Crons. 5 operations. Lead operation: List all crons. Self-contained Naftiko capability
    covering one Scaleway business surface.'
  tags:
  - Scaleway
  - Crons
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: serverless-functions-crons
    baseUri: https://api.scaleway.com
    description: Serverless Functions API — Crons business capability. Self-contained, no shared references.
    resources:
    - name: functions-v1beta1-regions-region-crons
      path: /functions/v1beta1/regions/{region}/crons
      operations:
      - name: listcrons
        method: GET
        description: List all crons
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: page
          in: query
          type: integer
          description: Page number.
        - name: page_size
          in: query
          type: integer
          description: Number of crons per page.
        - name: order_by
          in: query
          type: string
          description: Order of the crons.
        - name: function_id
          in: query
          type: string
          description: UUID of the function.
          required: true
      - name: createcron
        method: POST
        description: Create a new cron
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: functions-v1beta1-regions-region-crons-cron_id
      path: /functions/v1beta1/regions/{region}/crons/{cron_id}
      operations:
      - name: getcron
        method: GET
        description: Get a cron
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: cron_id
          in: path
          type: string
          description: UUID of the cron to get.
          required: true
      - name: updatecron
        method: PATCH
        description: Update an existing cron
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: cron_id
          in: path
          type: string
          description: UUID of the cron to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecron
        method: DELETE
        description: Delete an existing cron
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: cron_id
          in: path
          type: string
          description: UUID of the cron to delete.
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: serverless-functions-crons-rest
    port: 8080
    description: REST adapter for Serverless Functions API — Crons. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/functions/v1beta1/regions/{region}/crons
      name: functions-v1beta1-regions-region-crons
      description: REST surface for functions-v1beta1-regions-region-crons.
      operations:
      - method: GET
        name: listcrons
        description: List all crons
        call: serverless-functions-crons.listcrons
        with:
          region: rest.region
          page: rest.page
          page_size: rest.page_size
          order_by: rest.order_by
          function_id: rest.function_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcron
        description: Create a new cron
        call: serverless-functions-crons.createcron
        with:
          region: rest.region
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/functions/v1beta1/regions/{region}/crons/{cron-id}
      name: functions-v1beta1-regions-region-crons-cron-id
      description: REST surface for functions-v1beta1-regions-region-crons-cron_id.
      operations:
      - method: GET
        name: getcron
        description: Get a cron
        call: serverless-functions-crons.getcron
        with:
          region: rest.region
          cron_id: rest.cron_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatecron
        description: Update an existing cron
        call: serverless-functions-crons.updatecron
        with:
          region: rest.region
          cron_id: rest.cron_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecron
        description: Delete an existing cron
        call: serverless-functions-crons.deletecron
        with:
          region: rest.region
          cron_id: rest.cron_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: serverless-functions-crons-mcp
    port: 9090
    transport: http
    description: MCP adapter for Serverless Functions API — Crons. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-crons
      description: List all crons
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: serverless-functions-crons.listcrons
      with:
        region: tools.region
        page: tools.page
        page_size: tools.page_size
        order_by: tools.order_by
        function_id: tools.function_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-cron
      description: Create a new cron
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: serverless-functions-crons.createcron
      with:
        region: tools.region
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-cron
      description: Get a cron
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: serverless-functions-crons.getcron
      with:
        region: tools.region
        cron_id: tools.cron_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-existing-cron
      description: Update an existing cron
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: serverless-functions-crons.updatecron
      with:
        region: tools.region
        cron_id: tools.cron_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-existing-cron
      description: Delete an existing cron
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: serverless-functions-crons.deletecron
      with:
        region: tools.region
        cron_id: tools.cron_id
      outputParameters:
      - type: object
        mapping: $.

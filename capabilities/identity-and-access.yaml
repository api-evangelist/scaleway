naftiko: 1.0.0-alpha2
info:
  label: Scaleway Identity and Access
  description: Unified workflow capability for managing Scaleway identity and access management, combining IAM policies, API
    keys, users, groups, applications, and secret storage. Used by platform administrators and security teams to control access
    to Scaleway resources and manage credentials securely.
  tags:
  - Access Control
  - API Keys
  - IAM
  - Identity
  - Permissions
  - Policies
  - Scaleway
  - Security
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: scaleway-iam
    baseUri: https://api.scaleway.com
    description: Scaleway IAM API for identity and access management
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{SCALEWAY_API_KEY}}'
      placement: header
    resources:
    - name: api-keys
      path: /iam/v1alpha1/api-keys
      description: API key management
      operations:
      - name: list-api-keys
        method: GET
        description: List API Keys
        inputParameters:
        - name: order_by
          in: query
          type: string
          required: false
          description: Sort order
        - name: page
          in: query
          type: integer
          required: false
          description: Page number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-api-key
        method: POST
        description: Create an API Key
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            description: '{{tools.description}}'
            expires_at: '{{tools.expires_at}}'
    - name: api-key
      path: /iam/v1alpha1/api-keys/{access_key}
      description: Manage a specific API key
      operations:
      - name: get-api-key
        method: GET
        description: Get an API Key
        inputParameters:
        - name: access_key
          in: path
          type: string
          required: true
          description: API key access key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-api-key
        method: DELETE
        description: Delete an API Key
        inputParameters:
        - name: access_key
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /iam/v1alpha1/users
      description: User management
      operations:
      - name: list-users
        method: GET
        description: List Users
        inputParameters:
        - name: organization_id
          in: query
          type: string
          required: false
          description: Organization ID filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: groups
      path: /iam/v1alpha1/groups
      description: Group management
      operations:
      - name: list-groups
        method: GET
        description: List Groups
        inputParameters:
        - name: organization_id
          in: query
          type: string
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-group
        method: POST
        description: Create a Group
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            description: '{{tools.description}}'
    - name: policies
      path: /iam/v1alpha1/policies
      description: Policy management
      operations:
      - name: list-policies
        method: GET
        description: List Policies
        inputParameters:
        - name: organization_id
          in: query
          type: string
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-policy
        method: POST
        description: Create a Policy
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            rules: '{{tools.rules}}'
    - name: applications
      path: /iam/v1alpha1/applications
      description: Application management
      operations:
      - name: list-applications
        method: GET
        description: List Applications
        inputParameters:
        - name: organization_id
          in: query
          type: string
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: scaleway-secrets
    baseUri: https://api.scaleway.com
    description: Scaleway Secret Manager API
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{SCALEWAY_API_KEY}}'
      placement: header
    resources:
    - name: secrets
      path: /secret-manager/v1beta1/regions/{region}/secrets
      description: Secret management
      operations:
      - name: list-secrets
        method: GET
        description: List all secrets in a project
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        - name: project_id
          in: query
          type: string
          required: false
        - name: per_page
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-secret
        method: POST
        description: Create a new secret
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            project_id: '{{tools.project_id}}'
            description: '{{tools.description}}'
            type: '{{tools.type}}'
      - name: get-secret
        method: GET
        description: Get a secret by ID
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        - name: secret_id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-secret
        method: DELETE
        description: Delete a secret
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
        - name: secret_id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8083
    namespace: scaleway-identity-api
    description: Unified REST API for Scaleway identity, access management, and secret storage.
    resources:
    - path: /v1/api-keys
      name: api-keys
      description: API key management
      operations:
      - method: GET
        name: list-api-keys
        description: List IAM API keys
        call: scaleway-iam.list-api-keys
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-api-key
        description: Create an IAM API key
        call: scaleway-iam.create-api-key
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api-keys/{access_key}
      name: api-key
      description: Manage a specific API key
      operations:
      - method: GET
        name: get-api-key
        description: Get API key details
        call: scaleway-iam.get-api-key
        with:
          access_key: rest.access_key
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-api-key
        description: Delete an API key
        call: scaleway-iam.delete-api-key
        with:
          access_key: rest.access_key
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users
      name: users
      description: User management
      operations:
      - method: GET
        name: list-users
        description: List IAM users
        call: scaleway-iam.list-users
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups
      name: groups
      description: Group management
      operations:
      - method: GET
        name: list-groups
        description: List IAM groups
        call: scaleway-iam.list-groups
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-group
        description: Create an IAM group
        call: scaleway-iam.create-group
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/policies
      name: policies
      description: Access policy management
      operations:
      - method: GET
        name: list-policies
        description: List IAM policies
        call: scaleway-iam.list-policies
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-policy
        description: Create an IAM policy
        call: scaleway-iam.create-policy
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/secrets
      name: secrets
      description: Secret management
      operations:
      - method: GET
        name: list-secrets
        description: List secrets
        call: scaleway-secrets.list-secrets
        with:
          region: rest.region
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-secret
        description: Create a secret
        call: scaleway-secrets.create-secret
        with:
          region: rest.region
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/secrets/{id}
      name: secret
      description: Manage a specific secret
      operations:
      - method: GET
        name: get-secret
        description: Get secret details
        call: scaleway-secrets.get-secret
        with:
          region: rest.region
          secret_id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-secret
        description: Delete a secret
        call: scaleway-secrets.delete-secret
        with:
          region: rest.region
          secret_id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9093
    namespace: scaleway-identity-mcp
    transport: http
    description: MCP server for AI-assisted Scaleway identity, access, and secrets management.
    tools:
    - name: list-api-keys
      description: List Scaleway IAM API keys
      hints:
        readOnly: true
        openWorld: true
      call: scaleway-iam.list-api-keys
      outputParameters:
      - type: object
        mapping: $.
    - name: create-api-key
      description: Create a new IAM API key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: scaleway-iam.create-api-key
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-api-key
      description: Delete an IAM API key
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: scaleway-iam.delete-api-key
      with:
        access_key: tools.access_key
      outputParameters:
      - type: object
        mapping: $.
    - name: list-users
      description: List IAM users in the organization
      hints:
        readOnly: true
        openWorld: true
      call: scaleway-iam.list-users
      outputParameters:
      - type: object
        mapping: $.
    - name: list-groups
      description: List IAM groups
      hints:
        readOnly: true
        openWorld: true
      call: scaleway-iam.list-groups
      outputParameters:
      - type: object
        mapping: $.
    - name: list-policies
      description: List IAM policies
      hints:
        readOnly: true
        openWorld: true
      call: scaleway-iam.list-policies
      outputParameters:
      - type: object
        mapping: $.
    - name: list-secrets
      description: List secrets in Secret Manager
      hints:
        readOnly: true
        openWorld: true
      call: scaleway-secrets.list-secrets
      with:
        region: tools.region
      outputParameters:
      - type: object
        mapping: $.
    - name: create-secret
      description: Create a new secret in Secret Manager
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: scaleway-secrets.create-secret
      with:
        region: tools.region
      outputParameters:
      - type: object
        mapping: $.
    - name: get-secret
      description: Get a secret from Secret Manager
      hints:
        readOnly: true
        openWorld: false
      call: scaleway-secrets.get-secret
      with:
        region: tools.region
        secret_id: tools.secret_id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-secret
      description: Delete a secret from Secret Manager
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: scaleway-secrets.delete-secret
      with:
        region: tools.region
        secret_id: tools.secret_id
      outputParameters:
      - type: object
        mapping: $.

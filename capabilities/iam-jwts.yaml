naftiko: 1.0.0-alpha2
info:
  label: IAM API — JWTs
  description: 'IAM API — JWTs. 3 operations. Lead operation: List JWTs. Self-contained Naftiko capability covering one Scaleway
    business surface.'
  tags:
  - Scaleway
  - JWTs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: iam-jwts
    baseUri: https://api.scaleway.com
    description: IAM API — JWTs business capability. Self-contained, no shared references.
    resources:
    - name: iam-v1alpha1-jwts
      path: /iam/v1alpha1/jwts
      operations:
      - name: listjwts
        method: GET
        description: List JWTs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_by
          in: query
          type: string
          description: Criteria for sorting results.
        - name: audience_id
          in: query
          type: string
          description: ID of the user to search.
        - name: page_size
          in: query
          type: integer
          description: Number of results per page. Value must be between 1 and 100.
        - name: page
          in: query
          type: integer
          description: Page number. Value must be greater to 1.
        - name: expired
          in: query
          type: boolean
          description: Filter out expired JWTs or not.
    - name: iam-v1alpha1-jwts-jti
      path: /iam/v1alpha1/jwts/{jti}
      operations:
      - name: getjwt
        method: GET
        description: Get a JWT
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jti
          in: path
          type: string
          description: JWT ID of the JWT to get.
          required: true
      - name: deletejwt
        method: DELETE
        description: Delete a JWT
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jti
          in: path
          type: string
          description: JWT ID of the JWT to delete.
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: iam-jwts-rest
    port: 8080
    description: REST adapter for IAM API — JWTs. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/iam/v1alpha1/jwts
      name: iam-v1alpha1-jwts
      description: REST surface for iam-v1alpha1-jwts.
      operations:
      - method: GET
        name: listjwts
        description: List JWTs
        call: iam-jwts.listjwts
        with:
          order_by: rest.order_by
          audience_id: rest.audience_id
          page_size: rest.page_size
          page: rest.page
          expired: rest.expired
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/iam/v1alpha1/jwts/{jti}
      name: iam-v1alpha1-jwts-jti
      description: REST surface for iam-v1alpha1-jwts-jti.
      operations:
      - method: GET
        name: getjwt
        description: Get a JWT
        call: iam-jwts.getjwt
        with:
          jti: rest.jti
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletejwt
        description: Delete a JWT
        call: iam-jwts.deletejwt
        with:
          jti: rest.jti
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iam-jwts-mcp
    port: 9090
    transport: http
    description: MCP adapter for IAM API — JWTs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-jwts
      description: List JWTs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iam-jwts.listjwts
      with:
        order_by: tools.order_by
        audience_id: tools.audience_id
        page_size: tools.page_size
        page: tools.page
        expired: tools.expired
      outputParameters:
      - type: object
        mapping: $.
    - name: get-jwt
      description: Get a JWT
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iam-jwts.getjwt
      with:
        jti: tools.jti
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-jwt
      description: Delete a JWT
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: iam-jwts.deletejwt
      with:
        jti: tools.jti
      outputParameters:
      - type: object
        mapping: $.

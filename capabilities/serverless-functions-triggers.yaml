      with:
        region: tools.region
        page: tools.page
        page_size: tools.page_size
        order_by: tools.order_by
      outputParameters:
      - type: object
        mapping: $.
    - name: create-trigger
      description: Create a trigger
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: serverless-functions-triggers.createtrigger
      with:
        region: tools.region
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-trigger
      description: Get a trigger
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: serverless-functions-triggers.gettrigger
      with:
        region: tools.region
        trigger_id: tools.trigger_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-trigger
      description: Update a trigger
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: serverless-functions-triggers.updatetrigger
      with:
        region: tools.region
        trigger_id: tools.trigger_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-trigger
      description: Delete a trigger
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: serverless-functions-triggers.deletetrigger
      with:

naftiko: 1.0.0-alpha2
info:
  label: Serverless Functions API — Triggers
  description: 'Serverless Functions API — Triggers. 5 operations. Lead operation: List all triggers. Self-contained Naftiko
    capability covering one Scaleway business surface.'
  tags:
  - Scaleway
  - Triggers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCALEWAY_API_KEY: SCALEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: serverless-functions-triggers
    baseUri: https://api.scaleway.com
    description: Serverless Functions API — Triggers business capability. Self-contained, no shared references.
    resources:
    - name: functions-v1beta1-regions-region-triggers
      path: /functions/v1beta1/regions/{region}/triggers
      operations:
      - name: listtriggers
        method: GET
        description: List all triggers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: page
          in: query
          type: integer
          description: Page number to return.
        - name: page_size
          in: query
          type: integer
          description: Maximum number of triggers to return per page.
        - name: order_by
          in: query
          type: string
          description: Order in which to return results.
      - name: createtrigger
        method: POST
        description: Create a trigger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: functions-v1beta1-regions-region-triggers-trigger_id
      path: /functions/v1beta1/regions/{region}/triggers/{trigger_id}
      operations:
      - name: gettrigger
        method: GET
        description: Get a trigger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: trigger_id
          in: path
          type: string
          description: ID of the trigger to get.
          required: true
      - name: updatetrigger
        method: PATCH
        description: Update a trigger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: trigger_id
          in: path
          type: string
          description: ID of the trigger to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletetrigger
        method: DELETE
        description: Delete a trigger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          description: The region you want to target
          required: true
        - name: trigger_id
          in: path
          type: string
          description: ID of the trigger to delete.
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: serverless-functions-triggers-rest
    port: 8080
    description: REST adapter for Serverless Functions API — Triggers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/functions/v1beta1/regions/{region}/triggers
      name: functions-v1beta1-regions-region-triggers
      description: REST surface for functions-v1beta1-regions-region-triggers.
      operations:
      - method: GET
        name: listtriggers
        description: List all triggers
        call: serverless-functions-triggers.listtriggers
        with:
          region: rest.region
          page: rest.page
          page_size: rest.page_size
          order_by: rest.order_by
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtrigger
        description: Create a trigger
        call: serverless-functions-triggers.createtrigger
        with:
          region: rest.region
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/functions/v1beta1/regions/{region}/triggers/{trigger-id}
      name: functions-v1beta1-regions-region-triggers-trigger-id
      description: REST surface for functions-v1beta1-regions-region-triggers-trigger_id.
      operations:
      - method: GET
        name: gettrigger
        description: Get a trigger
        call: serverless-functions-triggers.gettrigger
        with:
          region: rest.region
          trigger_id: rest.trigger_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatetrigger
        description: Update a trigger
        call: serverless-functions-triggers.updatetrigger
        with:
          region: rest.region
          trigger_id: rest.trigger_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetrigger
        description: Delete a trigger
        call: serverless-functions-triggers.deletetrigger
        with:
          region: rest.region
          trigger_id: rest.trigger_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: serverless-functions-triggers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Serverless Functions API — Triggers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-triggers
      description: List all triggers
      hints:

    description: Load Balancer API — Alert Subscribers business capability. Self-contained, no shared references.
    resources:
    - name: lb-v1-zones-zone-lb-subscription-subscriber_id
      path: /lb/v1/zones/{zone}/lb/subscription/{subscriber_id}
      operations:
      - name: deletesubscriber
        method: DELETE
        description: Delete a subscriber
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: subscriber_id
          in: path
          type: string
          description: Subscriber ID.
          required: true
    - name: lb-v1-zones-zone-lb-lb_id-subscribe
      path: /lb/v1/zones/{zone}/lb/{lb_id}/subscribe
      operations:
      - name: subscribetolb
        method: POST
        description: Subscribe a subscriber to alerts for a given Load Balancer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: lb_id
          in: path
          type: string
          description: Load Balancer ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: lb-v1-zones-zone-lb-lb_id-unsubscribe
      path: /lb/v1/zones/{zone}/lb/{lb_id}/unsubscribe
      operations:
      - name: unsubscribefromlb
        method: DELETE
        description: Unsubscribe a subscriber from alerts for a given Load Balancer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: lb_id
          in: path
          type: string
          description: Load Balancer ID.
          required: true
    - name: lb-v1-zones-zone-subscribers
      path: /lb/v1/zones/{zone}/subscribers
      operations:
      - name: listsubscriber
        method: GET
        description: List all subscribers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: order_by
          in: query
          type: string
          description: Sort order of subscribers in the response.
        - name: page
          in: query
          type: integer
          description: The page number to return, from the paginated results.
        - name: page_size
          in: query
          type: integer
          description: The number of items to return.
        - name: name
          in: query
          type: string
          description: Subscriber name to search for.
        - name: organization_id
          in: query
          type: string
          description: Filter subscribers by Organization ID.
        - name: project_id
          in: query
          type: string
          description: Filter subscribers by Project ID.
      - name: createsubscriber
        method: POST
        description: Create a subscriber
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: lb-v1-zones-zone-subscribers-subscriber_id
      path: /lb/v1/zones/{zone}/subscribers/{subscriber_id}
      operations:
      - name: getsubscriber
        method: GET
        description: Get a subscriber
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: subscriber_id
          in: path
          type: string
          description: Subscriber ID.
          required: true
      - name: updatesubscriber
        method: PUT
        description: Update a subscriber
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone
          in: path
          type: string
          description: The zone you want to target
          required: true
        - name: subscriber_id
          in: path
          type: string
          description: Subscriber ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.SCALEWAY_API_KEY}}'
      placement: header
